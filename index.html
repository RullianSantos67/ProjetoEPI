<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catraca Inteligente - Controle de EPI</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f1f5f9; color: #1e293b; text-align: center; padding: 20px; }
        h1 { margin-bottom: 5px; color: #0f172a; }
        p { margin-bottom: 20px; color: #64748b; }
        button { background-color: #2563eb; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 5px; }
        button:hover { background-color: #1d4ed8; }
        #webcam-container { margin: 20px auto; border: 5px solid #cbd5e1; border-radius: 10px; display: inline-block; overflow: hidden; }
        #label-container { margin: 15px auto; max-width: 500px; text-align: center; font-size: 18px; }
    </style>
</head>
<body>

    <h1>🚧 Catraca de Segurança IA</h1>
    <p>Verificação de Equipamento de Proteção Individual (EPI)</p>
    
    <div>
        <button type="button" onclick="init()">Ligar Câmera</button>
        <button type="button" onclick="switchCamera()">Alternar Câmera</button>
    </div>
    
    <div id="webcam-container"></div>
    
    <div id="label-container">Aguardando inicialização...</div>

    <div style="margin-top: 20px; border: 1px dashed #ccc; padding: 10px; max-width: 500px; margin-left: auto; margin-right: auto;">
        <h3>Testar com Arquivo (Dataset)</h3>
        <input type="file" id="file-input" accept="image/*" onchange="predictFromFile()">
        <div id="file-preview-container" style="margin-top: 10px;"></div>
    </div> 

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
